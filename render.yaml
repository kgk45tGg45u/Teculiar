services:
  - type: web
    name: dezhost-api-preview
    runtime: node
    plan: starter
    branch: main
    buildCommand: npm install && npm exec prisma generate -- --schema prisma/schema.prisma && npm --workspace @dezhost/api run build
    startCommand: npm exec prisma migrate deploy -- --schema prisma/schema.prisma && npm --workspace @dezhost/api run start:prod
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 24.15.0
      - key: DATABASE_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: PUBLIC_WEB_URL
        sync: false
      - key: PUBLIC_API_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d
      - key: EMERGENCY_ADMIN_EMAIL
        sync: false
      - key: EMERGENCY_ADMIN_PASSWORD
        sync: false
      - key: CRON_SECRET
        generateValue: true
      - key: RESELLBIZ_API_BASE_URL
        value: https://test.httpapi.com
      - key: RESELLBIZ_RESELLER_ID
        sync: false
      - key: RESELLBIZ_API_KEY
        sync: false
      - key: RESELLBIZ_DEFAULT_NS
        sync: false
      - key: VIRTUALMIN_ADMIN_ENDPOINT
        sync: false
      - key: VIRTUALMIN_ADMIN_USERNAME
        sync: false
      - key: VIRTUALMIN_ADMIN_PASSWORD
        sync: false
      - key: VIRTUALMIN_ADMIN_ALLOW_SELF_SIGNED
        value: "0"
      - key: VAT_COUNTRY_CODE
        value: DE
      - key: VAT_STANDARD_RATE
        value: "19"
