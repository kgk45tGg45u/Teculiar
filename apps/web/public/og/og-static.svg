<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f9fafb"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Left accent stripe -->
  <rect x="0" y="0" width="6" height="630" fill="#1a1a1a"/>

  <!-- Subtle decorative circle (top-right) -->
  <circle cx="1100" cy="-40" r="320" fill="#1a1a1a" fill-opacity="0.04"/>

  <!-- ── LOGO ─────────────────────────────────────── -->
  <!-- "dezhost" wordmark -->
  <text
    x="72" y="120"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="52"
    font-weight="800"
    fill="#1a1a1a"
    letter-spacing="-2"
  >dezhost</text>
  <!-- underscore cursor -->
  <rect x="370" y="96" width="34" height="7" rx="2" fill="#1a1a1a"/>

  <!-- Separator line -->
  <rect x="72" y="155" width="520" height="1.5" fill="#1a1a1a" fill-opacity="0.12"/>

  <!-- ── HEADLINE ─────────────────────────────────── -->
  <text
    x="72" y="280"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="72"
    font-weight="800"
    fill="#1a1a1a"
    letter-spacing="-3"
  >Ethisches Webhosting</text>

  <text
    x="72" y="366"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="72"
    font-weight="800"
    fill="#1a1a1a"
    letter-spacing="-3"
    fill-opacity="0.38"
  >aus Deutschland.</text>

  <!-- ── SUBLINE ─────────────────────────────────── -->
  <text
    x="72" y="450"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="26"
    font-weight="400"
    fill="#6b7280"
    letter-spacing="0"
  >Faire Preise · Persönlicher Support · DSGVO-konform</text>

  <!-- ── DOMAIN ──────────────────────────────────── -->
  <text
    x="72" y="575"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="20"
    font-weight="500"
    fill="#9ca3af"
  >dezhost.com</text>
</svg>
