<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Light background -->
  <rect width="1200" height="630" fill="#ffffff"/>

  <!-- Right column tint -->
  <rect x="820" y="0" width="380" height="630" fill="#f9fafb"/>

  <!-- Top border -->
  <rect x="0" y="0" width="1200" height="6" fill="#1a1a1a"/>

  <!-- ── LOGO ─────────────────────────────────────── -->
  <text
    x="72" y="120"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="52"
    font-weight="800"
    fill="#1a1a1a"
    letter-spacing="-2"
  >dezhost</text>
  <rect x="257" y="122" width="31" height="8" rx="1" fill="#1a1a1a"/>

  <!-- Separator -->
  <rect x="72" y="155" width="500" height="1.5" fill="#1a1a1a" fill-opacity="0.12"/>

  <!-- "Blog" label -->
  <text
    x="72" y="205"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="15"
    font-weight="700"
    fill="#9ca3af"
    letter-spacing="2"
  >BLOG</text>

  <!-- ── HEADLINE ─────────────────────────────────── -->
  <text
    x="72" y="320"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="72"
    font-weight="800"
    fill="#1a1a1a"
    letter-spacing="-3"
  >Wissen, das</text>

  <text
    x="72" y="408"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="72"
    font-weight="800"
    fill="#1a1a1a"
    letter-spacing="-3"
  >wirklich hilft.</text>

  <!-- ── SUBLINE ─────────────────────────────────── -->
  <text
    x="72" y="480"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="24"
    font-weight="400"
    fill="#6b7280"
  >Hosting · Domains · Datenschutz · Tutorials</text>

  <!-- Right column: decorative lines mimicking article text -->
  <rect x="865" y="120" width="270" height="10" rx="4" fill="#1a1a1a" fill-opacity="0.08"/>
  <rect x="865" y="148" width="220" height="10" rx="4" fill="#1a1a1a" fill-opacity="0.08"/>
  <rect x="865" y="176" width="250" height="10" rx="4" fill="#1a1a1a" fill-opacity="0.08"/>
  <rect x="865" y="204" width="180" height="10" rx="4" fill="#1a1a1a" fill-opacity="0.08"/>
  <rect x="865" y="248" width="260" height="10" rx="4" fill="#1a1a1a" fill-opacity="0.06"/>
  <rect x="865" y="276" width="200" height="10" rx="4" fill="#1a1a1a" fill-opacity="0.06"/>
  <rect x="865" y="304" width="240" height="10" rx="4" fill="#1a1a1a" fill-opacity="0.06"/>
  <rect x="865" y="332" width="160" height="10" rx="4" fill="#1a1a1a" fill-opacity="0.06"/>

  <!-- ── DOMAIN ──────────────────────────────────── -->
  <text
    x="72" y="575"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="20"
    font-weight="500"
    fill="#9ca3af"
  >dezhost.com/blog</text>
</svg>
