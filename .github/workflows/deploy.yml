name: Build & Deploy

# main → build `:latest` + deploy to the LIVE prod (/opt/dezhost).
# feat/teculiar-phase4-separation (or manual dispatch) → build `:edge` only, NO deploy. This lets the
# multi-tenant Teculiar stack be built + pulled onto the box without touching the live single-tenant prod.
on:
  push:
    branches: [main, feat/teculiar-phase4-separation]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  
jobs:
  build-and-push:
    name: Build Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Docker image names must be lowercase — GitHub usernames can have capitals.
      # Step outputs (>> $GITHUB_OUTPUT) are the recommended way to pass
      # computed values between steps without triggering linter warnings.
      - name: Set lowercase image names
        id: vars
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          echo "image_api=ghcr.io/${OWNER}/dezhost-api" >> $GITHUB_OUTPUT
          echo "image_web=ghcr.io/${OWNER}/dezhost-web" >> $GITHUB_OUTPUT
          echo "image_storefront=ghcr.io/${OWNER}/dezhost-storefront" >> $GITHUB_OUTPUT
          # Moving tag: `latest` for main (live prod), `edge` for the pre-release Teculiar stack.
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then echo "tag=latest" >> $GITHUB_OUTPUT; else echo "tag=edge" >> $GITHUB_OUTPUT; fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── API image ─────────────────────────────────────────────────────────────
      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ${{ steps.vars.outputs.image_api }}:${{ steps.vars.outputs.tag }}
            ${{ steps.vars.outputs.image_api }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Web (dashboards) image ─────────────────────────────────────────────────
      - name: Build and push Web (dashboards) image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          # NEXT_PUBLIC_API_URL is now only an OPTIONAL server-side fallback (the browser calls
          # same-origin /api). Kept for single-tenant/back-compat; safe to leave the secret unset.
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          tags: |
            ${{ steps.vars.outputs.image_web }}:${{ steps.vars.outputs.tag }}
            ${{ steps.vars.outputs.image_web }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Storefront (thin Blue theme) image ──────────────────────────────────────
      - name: Build and push Storefront image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.storefront
          push: true
          # No build args: the storefront bakes no API URL (same-origin /api + runtime TECULIAR_UPSTREAM).
          tags: |
            ${{ steps.vars.outputs.image_storefront }}:${{ steps.vars.outputs.tag }}
            ${{ steps.vars.outputs.image_storefront }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    # Only main auto-deploys to the LIVE prod. Branch/dispatch builds `:edge` and stop after push,
    # so the Teculiar stack is pulled onto the box by hand (docs/teculiar-operations.md Part H).
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Write the private key to a file and add the server to known_hosts
      # so ssh does not prompt for confirmation.
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      # docker login is NOT done here — credentials are stored permanently on
      # the server after a one-time setup (see DEPLOYMENT.md step 2.9).
      # This keeps secrets out of every deploy run entirely.
      - name: Sync compose file to server
        run: |
          scp -i ~/.ssh/deploy_key \
            docker-compose.prod.yml \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/dezhost/docker-compose.prod.yml"

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "set -e
            cd /opt/dezhost
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f"
