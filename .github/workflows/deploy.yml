name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  # Images are tagged as ghcr.io/<owner>/dezhost-api and dezhost-web
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/dezhost-api
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/dezhost-web

jobs:
  build-and-push:
    name: Build Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── API image ───────────────────────────────────────────────────────────
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ${{ env.IMAGE_API }}:latest
            ${{ env.IMAGE_API }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Web image ───────────────────────────────────────────────────────────
      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.web
          push: true
          # NEXT_PUBLIC_API_URL is baked into the Next.js bundle at build time.
          # Set this secret in GitHub → Settings → Secrets → Actions.
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          tags: |
            ${{ env.IMAGE_WEB }}:latest
            ${{ env.IMAGE_WEB }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production   # optional: add manual approval in GitHub Environments

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          # Optional: port: ${{ secrets.SSH_PORT }}  (default 22)
          script: |
            set -e
            cd /opt/dezhost

            # Authenticate with ghcr.io using the deploy token stored on the server
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Pull the freshly built images
            docker compose -f docker-compose.prod.yml pull

            # Restart containers (API runs migrations on startup)
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Remove dangling images to save disk space
            docker image prune -f
        env:
          # These two are read by the SSH script — store them as server-side env vars
          # in /opt/dezhost/.env.deploy or export them in /etc/profile.d/dezhost.sh
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER:  ${{ github.repository_owner }}
