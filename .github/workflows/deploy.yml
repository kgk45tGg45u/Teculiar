name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Docker image names must be lowercase — GitHub usernames can have capitals.
      # Step outputs (>> $GITHUB_OUTPUT) are the recommended way to pass
      # computed values between steps without triggering linter warnings.
      - name: Set lowercase image names
        id: vars
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          echo "image_api=ghcr.io/${OWNER}/dezhost-api" >> $GITHUB_OUTPUT
          echo "image_web=ghcr.io/${OWNER}/dezhost-web" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── API image ─────────────────────────────────────────────────────────────
      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ${{ steps.vars.outputs.image_api }}:latest
            ${{ steps.vars.outputs.image_api }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Web image ─────────────────────────────────────────────────────────────
      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          # NEXT_PUBLIC_API_URL is baked into the Next.js bundle at build time.
          # Set this secret in GitHub → Settings → Secrets → Actions.
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          tags: |
            ${{ steps.vars.outputs.image_web }}:latest
            ${{ steps.vars.outputs.image_web }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/dezhost

            # Authenticate with ghcr.io to pull the private images
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Pull the freshly built images
            docker compose -f docker-compose.prod.yml pull

            # Restart containers (API runs migrations on startup)
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Remove dangling images to save disk space
            docker image prune -f
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER:  ${{ github.repository_owner }}
