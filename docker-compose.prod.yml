services:
  api:
    image: ghcr.io/kgk45tgg45u/dezhost-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    # Bind to localhost only — Apache in Virtualmin proxies inbound traffic. Never expose publicly.
    # Host port is configurable so a second stack (the Teculiar pre-release on /opt/teculiar) can
    # coexist with the live single-tenant prod (/opt/dezhost) on the same box during the transition.
    ports:
      - "127.0.0.1:${API_PORT:-4000}:4000"
    env_file:
      - .env
    # Extra hosts lets the container reach MariaDB running on the host machine.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Shared uploads volume — the API writes logo/favicon/blog images here;
    # the web container reads them as Next.js static files.
    volumes:
      - uploads:/app/apps/web/public/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/v1/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      # 120s gives plenty of time for Prisma migrations on first boot
      start_period: 120s

  # Hosted dashboards (admin + client), served at the tenant subdomains (*.teculiar.net).
  web:
    image: ghcr.io/kgk45tgg45u/dezhost-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      # SSR reaches the API over the container network; the browser uses same-origin /api (Apache).
      - API_INTERNAL_URL=${API_INTERNAL_URL:-http://api:4000}
      # White-label: dashboard bundles move to /_dash/_next so they don't collide with the storefront's
      # own /_next when it reverse-proxies /admin,/client. The teculiar.net vhost strips /_dash → /_next.
      - DASHBOARD_ASSET_PREFIX=${DASHBOARD_ASSET_PREFIX:-/_dash}
    # Same uploads volume so the web container can serve files written by the API.
    volumes:
      - uploads:/app/apps/web/public/uploads
    # service_started (not service_healthy) so the deploy does not block
    # waiting for health checks — the web container handles API-not-ready
    # gracefully on its own.
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/admin/login"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Thin, distributable Blue storefront (Teculiar.com's own marketing site = tenant #0). Reverse-proxies
  # /api,/uploads,/admin,/client,/login to the tenant upstream so browser calls are same-origin.
  storefront:
    image: ghcr.io/kgk45tgg45u/dezhost-storefront:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${STOREFRONT_PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      # The tenant this storefront belongs to (dashboards + API). For teculiar.com this is the
      # teculiar dogfood tenant. TECULIAR_API_UPSTREAM may point straight at the API container.
      - TECULIAR_UPSTREAM=${TECULIAR_UPSTREAM:-https://teculiar.teculiar.net}
      - TECULIAR_API_UPSTREAM=${TECULIAR_API_UPSTREAM:-}
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  uploads:
    # Named volume persisted on the host across deploys.
    # Existing uploads survive image updates.
