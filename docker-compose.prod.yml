services:
  api:
    image: ghcr.io/YOUR_GITHUB_USERNAME/dezhost-api:latest
    restart: unless-stopped
    # Bind to localhost only — Nginx on the host proxies inbound traffic.
    # Never expose port 4000 publicly.
    ports:
      - "127.0.0.1:4000:4000"
    env_file:
      - /opt/dezhost/.env
    # Extra hosts lets the container reach MariaDB running on the host machine.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web:
    image: ghcr.io/YOUR_GITHUB_USERNAME/dezhost-web:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - /opt/dezhost/.env
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
