services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: crimson
      POSTGRES_PASSWORD: crimson
      POSTGRES_DB: crimson_hosting
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crimson -d crimson_hosting"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
